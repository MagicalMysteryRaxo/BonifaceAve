<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boniface Ave</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"

    <link rel="stylesheet" href="css/global.css" />

      href="images/Favicon-and-logo/favicon.ico"

  <body>
    <!-- Navbar will be loaded here by main.js -->
    <div id="navbar-holder"></div>

    <div class="container" id="everything-holderHOME">

        <div class="side-card right">
          <img src="images/hsbanner.png" class="side-card-image" />
